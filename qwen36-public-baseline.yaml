schema_version: llm_bench.run_spec.v1

name: qwen36-fast-public-baseline
project: benchmark-harness
tags:
  - openai-compatible
  - public-baseline
  - mmlu
  - gpqa
  - bbh
  - qwen36

artifact:
  kind: openai_endpoint
  mode: external_path
  path: http://127.0.0.1:4000/v1
  model_id: qwen36-fast

runtime:
  kind: openai_compatible
  launch: existing
  host: 127.0.0.1
  port: 4000
  model_name: qwen36-fast

workload:
  prompt_suite: public_baseline
  task_dir: tasks/public_baseline
  max_tokens: 256
  temperature: 0.0
  num_runs: 3
  concurrency: 1

storage:
  artifact_policy: external_path
  result_policy: managed
