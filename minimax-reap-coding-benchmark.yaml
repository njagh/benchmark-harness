schema_version: llm_bench.run_spec.v1
name: minimax-reap-coding-benchmark
project: benchmark-harness
tags:
  - openai-compatible
  - coding-benchmark
  - humaneval
  - mbpp
  - minimax-reap

artifact:
  kind: openai_endpoint
  mode: external_path
  path: http://127.0.0.1:8018/v1
  model_id: minimax-reap

runtime:
  kind: openai_compatible
  launch: existing
  host: localhost
  port: 8018
  model_name: minimax-reap
  endpoint: http://127.0.0.1:8018/v1

workload:
  prompt_suite: coding_benchmark
  task_dir: tasks/coding_benchmark
  max_tokens: 8192
  temperature: 0.0
  num_runs: 3
  concurrency: 1

storage:
  artifact_policy: external_path
  result_policy: managed