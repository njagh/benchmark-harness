id: quant.math_reasoning_001
family: math_reasoning
prompt: |
  Solve the following math problem step by step. Show all work.

  A train leaves Station A traveling at 60 mph. At the same time, another train
  leaves Station B, 300 miles away, traveling toward Station A at 40 mph.
  How many hours until the two trains meet?

  Answer in the format: "They meet after X hours."
expected:
  type: regex
  patterns:
    - "[Mm]eet.*[Aa]fter"
    - "\\d+\\.?\\d*"
scoring:
  primary: regex
