version: "3.8"

services:
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      - REDIS_HOST=redis-server
      - REDIS_PORT=6379
    depends_on:
      - redis-server

  redis-server:
    image: redis:7-alpine
    ports:
      - "99999:6379"
    command: redis-server --appendonly yes

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - REDIS_URL=redis://redis-server:99999
