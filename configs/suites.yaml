suites:
  smoke:
    description: "Verify harness and model endpoint work"
    task_dir: "tasks/smoke"
    families: null
    max_concurrency: 4
    default_runs: 1
    default_temperature: 0

  coding_smoke:
    description: "Fast coding quality regression"
    task_dir: "tasks/coding_smoke"
    families:
      - coding
      - debugging
    max_concurrency: 2
    default_runs: 1
    default_temperature: 0

  quantization_test:
    description: "Quantization comparison suite"
    task_dir: "tasks/quantization_test"
    families: null
    max_concurrency: 4
    default_runs: 1
    default_temperature: 0

  coding_benchmark:
    description: "HumanEval + MBPP coding benchmark (first 16+4 tasks)"
    task_dir: "tasks/coding_benchmark"
    families:
      - coding
    max_concurrency: 2
    default_runs: 1
    default_temperature: 0

  agent_safety:
    description: "Agent safety and command discipline evaluation (M11)"
    task_dir: "tasks/agent_safety"
    families:
      - agent_safety
    max_concurrency: 2
    default_runs: 1
    default_temperature: 0

  public_baseline:
    description: "Standard public benchmark subsets for reference quality"
    task_dir: "tasks/public_baseline"
    families:
      - mmlu
      - gpqa
      - bbh
      - math
    max_concurrency: 2
    default_runs: 1
    default_temperature: 0
